<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Work Shift Tracker">
    <title>Work Shift Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #12192e;
            --bg-card: #1a2238;
            --text-primary: #e8eef7;
            --text-secondary: #9ca8c1;
            --accent: #00d4ff;
            --accent-hover: #00b8e6;
            --success: #00ff88;
            --warning: #ffd700;
            --danger: #ff4757;
            --border: rgba(0, 212, 255, 0.15);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 0 0 80px 0;
            font-size: 15px;
            line-height: 1.5;
        }

        .header {
            background: linear-gradient(135deg, #1a2238 0%, #0a0e1a 100%);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .timer {
            font-size: 48px;
            font-weight: 700;
            color: var(--accent);
            font-variant-numeric: tabular-nums;
            letter-spacing: 2px;
        }

        .container {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .section {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--accent);
        }

        .water-list {
            display: grid;
            gap: 10px;
        }

        .water-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-secondary);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .water-name {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 16px;
            padding: 8px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .water-name:focus {
            outline: none;
            background: rgba(0, 212, 255, 0.1);
        }

        .water-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            background: transparent;
            color: var(--accent);
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .water-btn.checked {
            background: var(--accent);
            color: var(--bg-primary);
            transform: scale(1.1);
        }

        .remove-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid var(--danger);
            background: transparent;
            color: var(--danger);
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .remove-btn:hover {
            background: var(--danger);
            color: white;
        }

        .add-water-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 2px dashed var(--accent);
            background: transparent;
            color: var(--accent);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .add-water-btn:hover {
            background: rgba(0, 212, 255, 0.1);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--bg-secondary);
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--success);
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .control-btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 12px;
        }

        .start-btn {
            background: linear-gradient(135deg, var(--success), #00b86e);
            color: var(--bg-primary);
        }

        .pause-btn {
            background: linear-gradient(135deg, var(--warning), #e6c200);
            color: var(--bg-primary);
        }

        .reset-btn {
            background: linear-gradient(135deg, var(--danger), #e63946);
            color: white;
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Work Shift Tracker</h1>
        <div class="timer" id="timer">00:00:00</div>
    </div>

    <div class="container">
        <div class="section">
            <div class="section-title">Controls</div>
            <button class="control-btn start-btn" id="startBtn">Start Shift</button>
            <button class="control-btn pause-btn hidden" id="pauseBtn">Pause</button>
            <button class="control-btn reset-btn" id="resetBtn">Reset All</button>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="waterCount">0</div>
                <div class="stat-label">Waters Checked</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="waterTotal">8</div>
                <div class="stat-label">Total Waters</div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Water Station Checklist</div>
            <div class="water-list" id="waterList"></div>
            <button class="add-water-btn" id="addWaterBtn">+ Add Water Station</button>
        </div>
    </div>

    <script>
        let startTime = null;
        let elapsedTime = 0;
        let timerInterval = null;
        let isRunning = false;

        const defaultWaters = [
            'Water 1', 'Water 2', 'Water 3', 'Water 4',
            'Water 5', 'Water 6', 'Water 7', 'Water 8'
        ];

        let waters = [...defaultWaters];
        let checkedWaters = new Set();

        function updateTimer() {
            const totalSeconds = Math.floor(elapsedTime / 1000);
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            document.getElementById('timer').textContent = 
                `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        function startTimer() {
            if (!isRunning) {
                startTime = Date.now() - elapsedTime;
                timerInterval = setInterval(() => {
                    elapsedTime = Date.now() - startTime;
                    updateTimer();
                }, 100);
                isRunning = true;
                document.getElementById('startBtn').classList.add('hidden');
                document.getElementById('pauseBtn').classList.remove('hidden');
            }
        }

        function pauseTimer() {
            if (isRunning) {
                clearInterval(timerInterval);
                isRunning = false;
                document.getElementById('startBtn').classList.remove('hidden');
                document.getElementById('pauseBtn').classList.add('hidden');
            }
        }

        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            elapsedTime = 0;
            checkedWaters.clear();
            updateTimer();
            updateWaterCount();
            renderWaters();
            document.getElementById('startBtn').classList.remove('hidden');
            document.getElementById('pauseBtn').classList.add('hidden');
        }

        function updateWaterCount() {
            document.getElementById('waterCount').textContent = checkedWaters.size;
            document.getElementById('waterTotal').textContent = waters.length;
        }

        function toggleWater(index) {
            if (checkedWaters.has(index)) {
                checkedWaters.delete(index);
            } else {
                checkedWaters.add(index);
            }
            updateWaterCount();
            renderWaters();
        }

        function removeWater(index) {
            waters.splice(index, 1);
            checkedWaters.delete(index);
            const newChecked = new Set();
            checkedWaters.forEach(i => {
                if (i > index) newChecked.add(i - 1);
                else if (i < index) newChecked.add(i);
            });
            checkedWaters = newChecked;
            updateWaterCount();
            renderWaters();
        }

        function updateWaterName(index, newName) {
            waters[index] = newName || `Water ${index + 1}`;
        }

        function addWater() {
            waters.push(`Water ${waters.length + 1}`);
            updateWaterCount();
            renderWaters();
        }

        function renderWaters() {
            const waterList = document.getElementById('waterList');
            waterList.innerHTML = waters.map((water, index) => `
                <div class="water-item">
                    <input type="text" class="water-name" value="${water}" 
                           onchange="updateWaterName(${index}, this.value)"
                           placeholder="Water name">
                    <button class="water-btn ${checkedWaters.has(index) ? 'checked' : ''}" 
                            onclick="toggleWater(${index})">
                        ${checkedWaters.has(index) ? '✓' : '○'}
                    </button>
                    <button class="remove-btn" onclick="removeWater(${index})" title="Remove">×</button>
                </div>
            `).join('');
        }

        document.getElementById('startBtn').onclick = startTimer;
        document.getElementById('pauseBtn').onclick = pauseTimer;
        document.getElementById('resetBtn').onclick = resetTimer;
        document.getElementById('addWaterBtn').onclick = addWater;

        renderWaters();
        updateWaterCount();
        updateTimer();
    </script>
</body>
</html>
